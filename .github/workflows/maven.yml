name: Test Automation Workflow

on:
  schedule:
    - cron: 00 18 * * *
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Running Test Automation Framework using Maven
      run: mvn test -X -Dbrowser=chrome -DisLambdaTest=true -DisHeadless=false

    - name: Upload Test Logs
      if: always()
      uses: actions/download-artifact@v4
      with:
        name: Test Logs
        path: logs/

    - name: Upload Screenshots
      if: always()
      uses: actions/download-artifact@v4
      with:
        name: Screenshots
        path: Screenshots/


    - name: Upload Test Reports
      if: always()
      uses: actions/download-artifact@v4
      with:
        name: Test Reports
        path: report.html

    - name: Test Execution Status
      run: echo "Test Execution Completed"

    - name: Copy report into gh-pages folder
      if: always()
      run: |
        mkdir: -p public/extent-reports/Screenshots
        cp -R report.html public/extent-reports/
        cp -R Screenshots/* public/extent-reports/Screenshots/
        ls -l public/extent-reports


    - name: Deploy to GitHub Pages
      if: always()
      uses: JamesIves/github-pages-deploy-action@v4.8.0
      with:
        folder: public/extent-reports
        token: ${{secrets.PATNew}}
        clean: true
    
      
      
    
    
   
